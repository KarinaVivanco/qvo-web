<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QVO — Quiroz Vivanco Operations SAC</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
  }

  /* Fondo con puntos igual al logo */
  .bg-dots {
    position: fixed; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  /* Resplandor azul de fondo */
  .bg-glow {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, rgba(30,60,120,0.3) 0%, transparent 70%);
    z-index: 0;
  }

  /* Contenedor principal */
  .splash {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  /* Logo */
  .logo-wrap {
    animation: logoIn 1.5s ease both;
  }
  .logo-wrap img {
    width: clamp(380px, 75vw, 900px);
    height: auto;
    filter: drop-shadow(0 0 40px rgba(77,144,255,0.5))
            drop-shadow(0 0 80px rgba(77,144,255,0.25));
  }

  /* Nombre de la empresa */
  .company-name {
    font-size: clamp(12px, 2vw, 16px);
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-top: 1.5rem;
    animation: fadeUp 1.8s ease both;
  }

  /* Línea decorativa */
  .line {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(77,144,255,0.6), transparent);
    margin: 1.5rem auto;
    animation: fadeUp 2s ease both;
  }

  /* Botón entrar */
  .btn-enter {
    display: inline-block;
    padding: 14px 52px;
    border: 1px solid rgba(77,144,255,0.6);
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    transition: all 0.4s;
    animation: fadeUp 2.2s ease both;
    position: relative;
    overflow: hidden;
  }
  .btn-enter::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(77,144,255,0.08);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s;
  }
  .btn-enter:hover::before { transform: scaleX(1); }
  .btn-enter:hover {
    border-color: rgba(77,144,255,1);
    color: #fff;
    box-shadow: 0 0 30px rgba(77,144,255,0.5),
                0 0 60px rgba(77,144,255,0.2);
    letter-spacing: 6px;
  }

  /* Overlay negro para el fade out al hacer clic */
  .overlay {
    position: fixed; inset: 0;
    background: #000;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }
  .overlay.fade-out { opacity: 1; pointer-events: all; }

  /* Animaciones de entrada */
  @keyframes logoIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Fondo -->
<div class="bg-dots"></div>
<div class="bg-glow"></div>

<!-- Overlay para el fade -->
<div class="overlay" id="overlay"></div>

<!-- Contenido splash -->
<div class="splash">

  <!-- Logo QVO -->
  <div class="logo-wrap">
    
    <img src="logo-splash.png" alt="QVO Logo">
  </div>

  <!-- Nombre empresa -->
  <div class="company-name">Quiroz Vivanco Operations SAC</div>

  <!-- Línea -->
  <div class="line"></div>

  <!-- Botón entrar -->
  // Espera 3 segundos y redirige automáticamente
setTimeout(function() {
    document.getElementById('overlay').classList.add('fade-out');
    setTimeout(function() {
      window.location.href = 'home.html';
    }, 800);
  }, 3000);

</div>

<script>
  // Espera 3 segundos y redirige automáticamente
setTimeout(function() {
    document.getElementById('overlay').classList.add('fade-out');
    setTimeout(function() {
      window.location.href = 'home.html';
    }, 800);
  }, 3000);
</script>

</body>
</html>
